<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Cricket Score</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h1>🏏 Live Cricket Score</h1>

<div class="card">

<h2 id="matchTitle"></h2>

<h2>
Score:
<span id="score">0</span>/<span id="wickets">0</span>
</h2>

<h3>
Overs:
<span id="oversDisplay">0.0</span>
</h3>

<hr>

<label>Striker</label>
<input type="text" id="striker">

<label>Non-Striker</label>
<input type="text" id="nonStriker">

<label>Bowler</label>
<input type="text" id="bowler">


<hr>

<h2>Batting Score</h2>

<table border="1" width="100%">

</table>

<br>



<br><br>

<h3>Runs</h3>

<button onclick="addRun(0)">0</button>
<button onclick="addRun(1)">1</button>
<button onclick="addRun(2)">2</button>
<button onclick="addRun(3)">3</button>
<button onclick="addRun(4)">4</button>
<button onclick="addRun(6)">6</button>

<br><br>

<button onclick="wide()">Wide</button>

<button onclick="noBall()">No Ball</button>

<button onclick="wicket()">Wicket</button>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
