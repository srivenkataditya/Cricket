<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Cricket Score</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h1>🏏 Live Cricket Score</h1>

<div class="card">

<h2 id="matchTitle"></h2>

<h3 id="score">0/0</h3>

<p id="oversDisplay">Overs : 0.0</p>

<hr>

<label>Striker</label>
<input type="text" id="striker">

<label>Non-Striker</label>
<input type="text" id="nonStriker">

<label>Current Bowler</label>
<input type="text" id="bowler">

<button>Start Scoring</button>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
