<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cricket Scorer</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <div class="logo">
        🏏
    </div>

    <h1>Cricket Scorer</h1>

    <div class="card">

        <label>Team 1 Name</label>
        <input type="text" id="team1" placeholder="Enter Team 1 Name">

        <label>Team 2 Name</label>
        <input type="text" id="team2" placeholder="Enter Team 2 Name">

        <label>Number of Overs</label>
        <input type="number" id="overs" min="1" placeholder="Example : 10">

        <button id="startMatch">
            Start Match
        </button>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
